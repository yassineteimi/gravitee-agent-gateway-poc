# kind cluster for the Gravitee triple-gate PoC.
# Single control-plane node is enough for a homelab. Host ports 80/443 are
# mapped into the node so an ingress controller can expose the Gravitee
# Console, Developer Portal, Management API, and the API Gateway itself.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: gravitee
nodes:
  - role: control-plane
    image: kindest/node:v1.36.1
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
