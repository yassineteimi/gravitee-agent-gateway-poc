# Links the Gravitee Kubernetes Operator to our Management API. Every declared
# API references this context by name (spec.contextRef), so GKO knows which
# control plane to push it to. Credentials come from a Secret injected out of
# band by poc/scripts/inject-secrets.sh (from the gitignored .env), never
# committed. Reused by every gate, not just Gate 1.
apiVersion: gravitee.io/v1alpha1
kind: ManagementContext
metadata:
  name: apim-context
  namespace: gravitee
spec:
  # Qualified service name: GKO runs in the gko-system namespace, so the short
  # name does not resolve. <service>.<namespace> reaches the Management API.
  # baseUrl is the host:port only, with NO /management suffix: GKO appends the
  # /management/v2/... path itself (a suffix here yields /management/management).
  baseUrl: http://gravitee-apim-api.gravitee:83
  environmentId: DEFAULT
  organizationId: DEFAULT
  auth:
    secretRef:
      name: gravitee-mgmt-context-auth
