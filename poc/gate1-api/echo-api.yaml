# Gate 1, the first API: a v4 HTTP proxy declared entirely as a Kubernetes
# resource. GKO reconciles it into the Management API, so it also appears in the
# Console and Developer Portal. It proxies gateway path /echo to the in-cluster
# echo backend. This first cut uses a keyless plan (open access); an API-key
# plan and rate limiting come next.
apiVersion: gravitee.io/v1alpha1
kind: ApiV4Definition
metadata:
  name: echo-api
  namespace: gravitee
spec:
  contextRef:
    name: apim-context
  name: "Echo API"
  description: "Gate 1 demo: a v4 HTTP proxy API declared via GKO."
  version: "1.0"
  type: PROXY
  state: STARTED
  lifecycleState: PUBLISHED
  visibility: PUBLIC
  listeners:
    - type: HTTP
      paths:
        - path: "/echo"
      entrypoints:
        - type: http-proxy
          qos: AUTO
  endpointGroups:
    - name: default-group
      type: http-proxy
      endpoints:
        - name: echo-backend
          type: http-proxy
          # GKO 4.11 requires these explicitly (the published quickstart omits
          # them): the endpoint does not inherit shared group config, and is not
          # a secondary/failover endpoint.
          inheritConfiguration: false
          secondary: false
          configuration:
            target: http://echo-server:80
  # Required by the operator: without it the validating webhook dereferences a
  # nil pointer and panics (the published quickstart omits it).
  flowExecution:
    mode: DEFAULT
    matchRequired: false
  # API-level flow: rate limit every request to 5 per 10 seconds. Runs after the
  # plan's API-key check, so an unauthenticated call is rejected (401) before it
  # ever reaches this, and an authenticated caller over the limit gets a 429.
  flows:
    - name: rate-limit
      enabled: true
      selectors:
        - type: HTTP
          path: "/"
          pathOperator: STARTS_WITH
          methods: []
      request:
        - name: Rate Limit
          description: "5 requests per 10 seconds (demo)"
          enabled: true
          policy: rate-limit
          configuration:
            async: false
            addHeaders: true
            rate:
              useKeyOnly: false
              periodTime: 10
              limit: 5
              periodTimeUnit: SECONDS
              key: ""
      response: []
      subscribe: []
      publish: []
  plans:
    API_KEY:
      name: "API Key plan"
      description: "Requires an API key; rate limited to 5 requests / 10s."
      status: PUBLISHED
      security:
        type: API_KEY
