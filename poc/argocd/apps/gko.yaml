# Gravitee Kubernetes Operator (GKO). Installs the operator + its CRDs
# (ApiV4Definition, ManagementContext, Application, Subscription, ...). From M1
# on, APIs are declared as Kubernetes resources in git and reconciled by GKO,
# which pushes them to the Management API so they also appear in the Console and
# Developer Portal. sync-wave -1 makes the operator (and its CRDs) land before
# the Gate 1 custom resources that depend on them.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gko
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  source:
    repoURL: https://helm.gravitee.io
    chart: gko
    targetRevision: 4.11.10
    helm:
      values: |
        manager:
          scope:
            cluster: true
          # The metrics server self-generates an RSA TLS cert at startup, which
          # panics on this arm64 node via Go's FIPS-140 crypto
          # (slice-bounds-out-of-range in crypto/internal/fips140) and crash-loops
          # the operator. This chart build does not wire metrics.secured to a flag,
          # so the only effective fix is to disable the operator's own metrics
          # server. We do not need it for the PoC; revisit at the observability
          # milestone if GKO self-metrics are wanted.
          metrics:
            enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: gko-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
