# Gravitee Kubernetes Operator (GKO). Installs the operator + its CRDs
# (ApiV4Definition, ManagementContext, Application, Subscription, ...). From M1
# on, APIs are declared as Kubernetes resources in git and reconciled by GKO,
# which pushes them to the Management API so they also appear in the Console and
# Developer Portal. sync-wave -1 makes the operator (and its CRDs) land before
# the Gate 1 custom resources that depend on them.
#
# Sourced from a Kustomize overlay (poc/gko) rather than the Helm chart directly:
# the overlay inflates the same chart but patches in GODEBUG=fips140=off, which
# the chart cannot express and which the operator needs to stay stable on arm64.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gko
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  source:
    repoURL: https://github.com/yassineteimi/gravitee-agent-gateway-poc
    targetRevision: main
    path: poc/gko
  destination:
    server: https://kubernetes.default.svc
    namespace: gko-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
