# Ingress controller, kind-flavoured: the controller pod binds host ports
# 80/443 on the control-plane node (which kind maps to localhost), so browser
# traffic to the Gravitee hosts reaches the cluster.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    chart: ingress-nginx
    targetRevision: 4.15.1
    helm:
      values: |
        controller:
          hostPort:
            enabled: true
          service:
            type: ClusterIP
          nodeSelector:
            ingress-ready: "true"
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              operator: Equal
              effect: NoSchedule
          publishService:
            enabled: false
          watchIngressWithoutClass: true
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
