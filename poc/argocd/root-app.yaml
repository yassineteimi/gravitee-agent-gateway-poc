# App-of-apps. This is the single Application applied by hand after ArgoCD is
# installed; it then reconciles every child Application under poc/argocd/apps.
# From here on, the homelab is GitOps: a change is a commit, not a kubectl run.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/yassineteimi/gravitee-agent-gateway-poc
    targetRevision: main
    path: poc/argocd/apps
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
